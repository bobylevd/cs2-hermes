# CS2 modded server + Hermes admin agent — built and run on the server itself.
#
#   git pull
#   docker compose up -d --build        # build the thin layer + run
#   docker compose build --pull         # also refresh the base image
#   docker logs -f cs2-hermes
#
# First run downloads the base image + CS2 (several GB) and is slow.

services:
  cs2-hermes:
    build:
      context: .
      dockerfile: Dockerfile
      # args:
      #   BASE_IMAGE: ghcr.io/kus/cs2-modded-server:latest   # pin to a digest for reproducible builds
    image: cs2-hermes:latest
    container_name: cs2-hermes
    env_file:
      - .env
    volumes:
      - cs2-volume:/home/steam/          # named volume: the 67GB CS2 install (persists)
      # Hermes state (SOUL.md, self-authored skills, memory, sessions) on the host,
      # so you can browse/edit it and it survives restarts. Nested under the volume
      # above — Docker's more-specific mount wins for this subpath.
      - ./hermes-data:/home/steam/cs2/.hermes
      - ./custom_files:/home/custom_files/   # server-file persistence mirror; agent writes here survive mod updates
    ports:
      # 27015 is the game port AND the RCON port (protected by RCON_PASSWORD).
      - "27015:27015/tcp"
      - "27015:27015/udp"
      - "27020:27020/tcp"
      - "27020:27020/udp"
    cpu_count: 2
    mem_limit: 4000m
    restart: unless-stopped

volumes:
  cs2-volume:
