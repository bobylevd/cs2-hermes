# Build-only validation: proves the image builds before you `git pull` on the
# server. No registry push, no secrets. (The server builds its own image via
# `docker compose up -d --build`.) Delete this file if you don't want CI.
name: build

on:
  push:
    branches: [main]
    paths-ignore: ['**.md']
  pull_request:
    paths-ignore: ['**.md']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk (base image + CS2 layers are large)
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          docker system prune -af || true

      - uses: docker/setup-buildx-action@v3

      - name: Build image (validation only, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: cs2-hermes-admin:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
