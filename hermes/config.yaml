# Hermes config for the CS2 admin container. Seeded to $HERMES_HOME/config.yaml
# at boot; secrets come from $HERMES_HOME/.env via ${VAR}. See ../env.example.

# LLM backend (OpenAI-compatible by default: Kimi for Coding). Overridable via env.
model:
  default: "${HERMES_MODEL}"
  provider: "${HERMES_PROVIDER}"      # custom | openai-codex | anthropic | openai | auto
  api_key: "${HERMES_API_KEY}"
  base_url: "${HERMES_BASE_URL}"

# Shell runs locally in the Hermes container. cwd = HERMES_HOME so AGENTS.md loads
# as project context; the CS2 server files are at /home/steam/cs2 (shared volume).
terminal:
  backend: local
  cwd: "/opt/data"
  timeout: 300

# Auto-approve low-risk actions (file edits, normal commands); prompt only on
# genuinely dangerous ones. Hardline blocklist (rm -rf /, fork bombs, mkfs, dd to
# devices) always applies.
approvals:
  mode: "smart"                       # manual | smart | off
  timeout: 60

# cs2 skills load from HERMES_HOME/skills/cs2 (bind-mounted from ./skills/cs2).
skills:
  creation_nudge_interval: 15

gateway:
  platform: "${GATEWAY_PLATFORM}"     # telegram | discord

platforms:
  telegram:
    token: "${TELEGRAM_BOT_TOKEN}"
    reply_to_mode: "first"
    guest_mode: false
  # discord:
  #   token: "${DISCORD_BOT_TOKEN}"
  #   require_mention: true
